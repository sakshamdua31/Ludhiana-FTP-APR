name: Fetch PAU Advisory

on:
  schedule:
    - cron: "0 5 * * 3,6"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pdfplumber

      - name: Fetch PAU advisories
        run: python scripts/fetch_pau_advisory.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/advisory/pau_advisory.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update PAU advisory $(date -u +%Y-%m-%d)"
            git push
          fi
