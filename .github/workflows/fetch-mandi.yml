name: Fetch Ludhiana Mandi Prices

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Fetch Agmarknet data
        env:
          DATA_GOV_KEY: ${{ secrets.DATA_GOV_KEY }}
        run: python scripts/fetch_agmarknet.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mandi/ludhiana.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Ludhiana mandi prices"
            git push
          fi
